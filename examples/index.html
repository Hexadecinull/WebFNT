<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebFNT Demo</title>
    <link rel="icon" href="https://raw.githubusercontent.com/Hexadecinull/hexadecinull.github.io/refs/heads/main/assets/favicon.ico">
</head>
<body>
  <div id="game-ui"></div>

  <script type="module">
    import { createWebFNT } from '../src/index.js';

    async function init() {
      const font = await createWebFNT('./assets/bigFont.fnt');
      const display = document.getElementById('game-ui');
      font.render("HELLO WORLD 123", display);
    }

    init();
  </script>
</body>
</html>
