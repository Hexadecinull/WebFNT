<!DOCTYPE html>
<html>
<body>
  <div id="game-ui"></div>

  <script type="module">
    import { createWebFNT } from '../src/index.js';

    async function init() {
      const font = await createWebFNT('./assets/font.fnt');
      const display = document.getElementById('game-ui');
      font.render("HELLO WORLD 123", display);
    }

    init();
  </script>
</body>
</html>
